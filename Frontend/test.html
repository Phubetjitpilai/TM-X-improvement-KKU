<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Template Editor - Light Theme</title>
<style>
  :root {
    --surface-page: #F5F5F4;
    --surface-card: #FFFFFF;
    --surface-toolbar: #FAFAF9;
    --border: #E5E5E3;
    --border-strong: #C9C8C4;
    --text-primary: #1A1A19;
    --text-secondary: #6B6A66;
    --text-muted: #9A9994;
    --danger: #C22E2E;
    --bg-danger: #FCEBEB;
    --bg-accent: #E6F1FB;
    --text-accent: #185FA5;
    --header-bg: #F0F0EE;
    --grid-line: #E8E8E6;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    padding: 2rem;
    background: var(--surface-page);
    font-family: -apple-system, "Segoe UI", "Noto Sans Thai", Arial, sans-serif;
  }

  .panel {
    max-width: 920px;
    margin: 0 auto;
    background: var(--surface-card);
    border: 0.5px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
  }

  .toolbar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 16px;
    border-bottom: 0.5px solid var(--border);
    flex-wrap: wrap;
    background: var(--surface-toolbar);
  }

  select {
    padding: 6px 10px;
    border: 0.5px solid var(--border-strong);
    border-radius: 8px;
    background: var(--surface-card);
    font-size: 13px;
    color: var(--text-primary);
    font-family: inherit;
  }

  .tbtn {
    width: 32px;
    height: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: transparent;
    border: 0.5px solid transparent;
    border-radius: 8px;
    cursor: pointer;
    color: var(--text-primary);
    font-size: 13px;
    font-weight: 500;
    font-family: inherit;
  }

  .tbtn:hover { background: var(--header-bg); border-color: var(--border-strong); }
  .tbtn.active { background: var(--bg-accent); color: var(--text-accent); border-color: var(--text-accent); }

  .tbtn-wide {
    width: auto;
    padding: 0 12px;
    gap: 6px;
  }

  .divider {
    width: 0.5px;
    height: 22px;
    background: var(--border-strong);
    margin: 0 4px;
  }

  .icon-underline {
    position: relative;
  }

  .underline-bar {
    position: absolute;
    bottom: 4px;
    left: 6px;
    right: 6px;
    height: 2px;
  }

  .layout-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 16px;
    border-bottom: 0.5px solid var(--border);
    flex-wrap: wrap;
  }

  .layout-label {
    font-size: 11px;
    font-weight: 500;
    color: var(--text-muted);
    letter-spacing: 0.03em;
    margin-right: 4px;
  }

  .layout-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px 12px;
    border: 0.5px solid var(--border-strong);
    border-radius: 8px;
    background: var(--surface-card);
    font-size: 13px;
    color: var(--text-primary);
    cursor: pointer;
    font-family: inherit;
  }

  .layout-btn:hover { background: var(--header-bg); }

  .layout-btn.danger {
    color: var(--danger);
    border-color: var(--bg-danger);
    background: var(--bg-danger);
  }

  .formula-bar {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 16px;
    border-bottom: 0.5px solid var(--border);
  }

  .fx-icon {
    font-size: 13px;
    font-style: italic;
    color: var(--text-accent);
    font-weight: 500;
  }

  .formula-input {
    font-size: 13px;
    color: var(--text-muted);
  }

  .sheet {
    overflow-x: auto;
  }

  table {
    border-collapse: collapse;
    width: 100%;
    table-layout: fixed;
  }

  th, td {
    border: 0.5px solid var(--grid-line);
    font-size: 13px;
    text-align: center;
    padding: 0;
  }

  .corner-cell {
    width: 40px;
    background: var(--header-bg);
  }

  .col-header {
    height: 30px;
    background: var(--header-bg);
    color: var(--text-secondary);
    font-weight: 500;
    width: 80px;
  }

  .row-header {
    width: 40px;
    background: var(--header-bg);
    color: var(--text-secondary);
    font-weight: 500;
  }

  .cell {
    height: 34px;
    background: var(--surface-card);
  }
</style>
</head>
<body>

<div class="panel">

  <div class="toolbar">
    <select style="width: 90px;">
      <option>Arial</option>
    </select>
    <select style="width: 56px;">
      <option>11</option>
    </select>

    <button class="tbtn" aria-label="เพิ่มขนาดตัวอักษร">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 20L9 4h1l5 16"></path><path d="M5.5 15h8"></path><path d="M18 10v8M14 14h8"></path></svg>
    </button>
    <button class="tbtn" aria-label="ลดขนาดตัวอักษร">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 20L9 4h1l5 16"></path><path d="M5.5 15h8"></path><path d="M14 14h8"></path></svg>
    </button>

    <div class="divider"></div>

    <button class="tbtn" style="font-style: normal; font-weight: 700;" aria-label="ตัวหนา">B</button>
    <button class="tbtn" style="font-style: italic;" aria-label="ตัวเอียง">I</button>
    <button class="tbtn icon-underline" aria-label="ขีดเส้นใต้">
      U
      <span class="underline-bar" style="background: var(--text-primary);"></span>
    </button>

    <div class="divider"></div>

    <button class="tbtn active" aria-label="สีพื้นหลังตัวอักษร">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l6-6 4 4-6 6"></path><path d="M3 21l4-1 8-8-3-3-8 8-1 4z"></path></svg>
    </button>
    <button class="tbtn icon-underline" aria-label="สีตัวอักษร">
      A
      <span class="underline-bar" style="background: var(--danger);"></span>
    </button>

    <div class="divider"></div>

    <button class="tbtn tbtn-wide" aria-label="กรอบ">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="18" height="18" rx="1"></rect></svg>
      กรอบ
    </button>

    <div class="divider"></div>

    <button class="tbtn" aria-label="ชิดซ้าย">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="12" x2="15" y2="12"></line><line x1="3" y1="18" x2="18" y2="18"></line></svg>
    </button>
    <button class="tbtn" aria-label="กึ่งกลาง">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"></line><line x1="7" y1="12" x2="17" y2="12"></line><line x1="5" y1="18" x2="19" y2="18"></line></svg>
    </button>
    <button class="tbtn" aria-label="ชิดขวา">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"></line><line x1="9" y1="12" x2="21" y2="12"></line><line x1="6" y1="18" x2="21" y2="18"></line></svg>
    </button>

    <div class="divider"></div>

    <button class="tbtn" aria-label="ลดการเยื้อง">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="7 8 3 12 7 16"></polyline><line x1="21" y1="6" x2="11" y2="6"></line><line x1="21" y1="12" x2="11" y2="12"></line><line x1="21" y1="18" x2="11" y2="18"></line></svg>
    </button>
    <button class="tbtn" aria-label="เพิ่มการเยื้อง">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 8 7 12 3 16"></polyline><line x1="21" y1="6" x2="11" y2="6"></line><line x1="21" y1="12" x2="11" y2="12"></line><line x1="21" y1="18" x2="11" y2="18"></line></svg>
    </button>

    <div class="divider"></div>

    <button class="tbtn tbtn-wide" aria-label="Merge">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8L22 12L18 16"></path><path d="M6 8L2 12L6 16"></path><line x1="2" y1="12" x2="22" y2="12"></line></svg>
      Merge
    </button>
    <button class="tbtn tbtn-wide" aria-label="Unmerge">
      Unmerge
    </button>
  </div>

  <div class="layout-row">
    <span class="layout-label">LAYOUT</span>

    <button class="layout-btn">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
      เพิ่มแถว (บน)
    </button>
    <button class="layout-btn">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
      เพิ่มแถว (ล่าง)
    </button>
    <button class="layout-btn danger">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
      ลบแถว
    </button>

    <div class="divider"></div>

    <button class="layout-btn">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
      เพิ่มคอลัมน์ (ซ้าย)
    </button>
    <button class="layout-btn">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
      เพิ่มคอลัมน์ (ขวา)
    </button>
    <button class="layout-btn danger">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
      ลบคอลัมน์
    </button>
  </div>

  <div class="formula-bar">
    <span class="fx-icon">fx</span>
    <span class="formula-input">ค่าใน cell...</span>
  </div>

  <div class="sheet">
    <table>
      <thead>
        <tr>
          <th class="corner-cell"></th>
          <th class="col-header">A</th>
          <th class="col-header">B</th>
          <th class="col-header">C</th>
          <th class="col-header">D</th>
          <th class="col-header">E</th>
          <th class="col-header">F</th>
          <th class="col-header">G</th>
          <th class="col-header">H</th>
          <th class="col-header">I</th>
          <th class="col-header">J</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td class="row-header">1</td>
          <td class="cell"></td><td class="cell"></td><td class="cell"></td><td class="cell"></td><td class="cell"></td>
          <td class="cell"></td><td class="cell"></td><td class="cell"></td><td class="cell"></td><td class="cell"></td>
        </tr>
        <tr>
          <td class="row-header">2</td>
          <td class="cell"></td><td class="cell"></td><td class="cell"></td><td class="cell"></td><td class="cell"></td>
          <td class="cell"></td><td class="cell"></td><td class="cell"></td><td class="cell"></td><td class="cell"></td>
        </tr>
        <tr>
          <td class="row-header">3</td>
          <td class="cell"></td><td class="cell"></td><td class="cell"></td><td class="cell"></td><td class="cell"></td>
          <td class="cell"></td><td class="cell"></td><td class="cell"></td><td class="cell"></td><td class="cell"></td>
        </tr>
        <tr>
          <td class="row-header">4</td>
          <td class="cell"></td><td class="cell"></td><td class="cell"></td><td class="cell"></td><td class="cell"></td>
          <td class="cell"></td><td class="cell"></td><td class="cell"></td><td class="cell"></td><td class="cell"></td>
        </tr>
        <tr>
          <td class="row-header">5</td>
          <td class="cell"></td><td class="cell"></td><td class="cell"></td><td class="cell"></td><td class="cell"></td>
          <td class="cell"></td><td class="cell"></td><td class="cell"></td><td class="cell"></td><td class="cell"></td>
        </tr>
      </tbody>
    </table>
  </div>

</div>

</body>
</html>
